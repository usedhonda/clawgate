<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawGate</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="hero">
        <img class="hero-icon" src="../icons/icon48.png" alt="Chi">
        <h1 class="hero-title">ClawGate</h1>
      </header>

      <section class="status-card">
        <div class="status-row">
          <span id="status-dot" class="status-dot status-offline"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </section>

      <label class="field">
        <span class="field-label">Gateway URL</span>
        <input id="gateway-url" type="text" readonly placeholder="Connect to ClawGate first">
      </label>

      <label class="field">
        <span class="field-label">Gateway Token</span>
        <input id="gateway-token" type="text" readonly placeholder="Not connected">
      </label>

      <div class="actions">
        <button id="connect-button" class="primary-button" type="button">Connect to ClawGate</button>
        <button id="test-button" class="secondary-button" type="button">Test Connection</button>
      </div>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
